<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kevinshome - login</title>
    <style>
        body {
            margin: 0;
            display: grid;
            place-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <form action="/login/" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% if login_fail %}
            <p style="color: red;">Login Failed!</p>
        {% endif %}
        <input type="text" name="passcode" id="passcode" placeholder="Enter Passcode"><br><br><br>
    </form>
</body>
{% include "segments/_gohomefooter.htm" %}
</html>
